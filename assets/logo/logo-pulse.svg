<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgMono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#0044BB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bgMono)"/>

  <!--
    Original arcs from logo-voice-plus, rotated 90° clockwise about (60,60).
    Transform: (x,y) → (y, 120−x)

    Outer arc original: M28,60  Q60,90  92,60
    Rotated:            M60,92  Q90,60  60,28   ← C-shape opening RIGHT

    Inner arc original: M38,55  Q60,76  82,55
    Rotated:            M55,82  Q76,60  55,38   ← smaller C inside the outer
  -->
  <path d="M60,92 Q90,60 60,28" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M55,82 Q76,60 55,38" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>

  <!--
    Source dot original: cx=60 cy=46
    Rotated:             cx=46 cy=60   ← now on the left, pulse moves right
  -->
  <circle cx="46" cy="60" r="7" fill="white"/>

  <!-- Plus symbol — identical to logo-voice-plus, top-right -->
  <rect x="82"  y="18"  width="5"  height="18" rx="2.5" fill="white"/>
  <rect x="75.5" y="24.5" width="18" height="5"  rx="2.5" fill="white"/>
</svg>
