<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgMono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#0044BB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bgMono)"/>

  <!-- Minimalist mouth / speaking arc -->
  <!-- Outer arc (smile / voice mark) -->
  <path d="M28,60 Q60,90 92,60" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Inner arc (smaller, offset up slightly) -->
  <path d="M38,55 Q60,76 82,55" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- Microphone dot (center speech source) -->
  <circle cx="60" cy="46" r="7" fill="white"/>

  <!-- Plus symbol (top-right, clean) -->
  <rect x="82" y="18" width="5" height="18" rx="2.5" fill="white"/>
  <rect x="75.5" y="24.5" width="18" height="5" rx="2.5" fill="white"/>
</svg>
